<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverPrime | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.cdnfonts.com/css/syncopate');
        body { font-family: 'BPG Phone Sans Bold', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        #alarm-overlay { display: none; }
        #alarm-overlay.active { display: flex; animation: bg-flash 0.5s infinite alternate; }
        @keyframes bg-flash {
            from { background-color: rgba(220, 38, 38, 0.95); }
            to { background-color: rgba(153, 27, 27, 0.98); }
        }
        .admin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff0000; }
        
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .nav-btn.active { background: #dc2626; color: white; border-color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="alarm-overlay" class="fixed inset-0 z-[9999] flex-col items-center justify-center text-center p-6 backdrop-blur-xl">
        <div class="mb-6 animate-bounce"><span class="material-icons text-9xl text-white">warning</span></div>
        <h2 class="font-sync text-5xl md:text-7xl font-black italic mb-8 text-white uppercase tracking-tighter">New Order</h2>
        <div id="alarm-details" class="bg-black p-10 border-4 border-white text-left max-w-2xl w-full"></div>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center border-b border-red-600 pb-8 mb-8 gap-6">
        <div>
            <h1 class="font-sync text-3xl font-black italic uppercase tracking-tighter">Ever<span class="text-red-600">Prime</span></h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-50">Control Center v2.0</p>
        </div>
        <div id="user-stats" class="text-green-500 text-xs font-bold uppercase italic animate-pulse">კავშირი...</div>
    </header>

    <nav class="flex flex-wrap gap-2 mb-10">
        <button onclick="showSection('orders-sec', this)" class="nav-btn active border border-white/10 px-4 py-2 text-[10px] uppercase font-bold">შეკვეთები</button>
        <button onclick="showSection('upload-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold">ატვირთვა</button>
        <button onclick="showSection('delete-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold">წაშლა</button>
    </nav>

    <main>
        <section id="orders-sec" class="admin-section active">
            <div id="orders-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-4 custom-scrollbar"></div>
        </section>

        <section id="upload-sec" class="admin-section">
            <div class="admin-card p-8 border-l-4 border-red-600 max-w-2xl mx-auto">
                <input id="p-name" type="text" placeholder="პროდუქტი" class="w-full bg-black/40 border border-white/10 p-3 mb-4 text-white">
                <input id="p-price" type="number" placeholder="ფასი" class="w-full bg-black/40 border border-white/10 p-3 mb-4 text-white">
                <button onclick="window.uploadProduct()" class="w-full bg-red-600 p-4 font-black uppercase italic text-white">Upload</button>
            </div>
        </section>

        <section id="delete-sec" class="admin-section">
            <div id="inventory-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script>
        function showSection(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, doc, getDoc, deleteDoc, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getDatabase, ref, onValue, onChildAdded, limitToLast, query as rQuery } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtQfNnv6qDbnbHzZ-XE8pIylLRYg5UTbg",
            authDomain: "everprime-b80dd.firebaseapp.com",
            projectId: "everprime-b80dd",
            storageBucket: "everprime-b80dd.firebasestorage.app",
            messagingSenderId: "527537324294",
            appId: "1:527537324294:web:de1a4e25057389bc6e9e87",
            databaseURL: "https://everprime-b80dd-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        // --- გაგზავნის ფუნქცია (BEACON METHOD) ---
        function sendTelegramNotification(orderData) {
            const botToken = '8023573505:AAFRsExFNpP2d2YpQB4nGDlB-ZEFo3u7wxE';
            const chatId = '-1003731895302';
            
            const text = `🚀 EverPrime: ახალი შეკვეთა!\n\n` +
                         `📦 პროდუქტი: ${orderData.product || 'N/A'}\n` +
                         `📞 ტელეფონი: ${orderData.phone || 'N/A'}\n` +
                         `📧 Email: ${orderData.email || 'N/A'}\n` +
                         `📍 მისამართი: ${orderData.address || 'N/A'}\n` +
                         `⏰ დრო: ${new Date().toLocaleString('ka-GE')}`;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            // ყველაზე საიმედო გზა ბრაუზერისთვის
            const img = new Image();
            img.src = url;
            console.log("Telegram Request Sent");
        }

        function triggerAlarm(data) {
            const overlay = document.getElementById('alarm-overlay');
            const details = document.getElementById('alarm-details');
            if (!overlay || !details) return;
            details.innerHTML = `<p class="text-white text-xl uppercase font-bold">პროდუქტი: ${data.product}</p><p class="text-green-500">მისამართი: ${data.address || 'N/A'}</p>`;
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 5000);
        }

        function loadAdminData() {
            const ordersLiveRef = rQuery(ref(rtdb, 'orders_live'), limitToLast(1));
            
            // ყოველ ახალ ჩანაწერზე
            onChildAdded(ordersLiveRef, (snap) => {
                const order = snap.val();
                // თუ შეკვეთა ბოლო 30 წამშია გაკეთებული
                if (order.timestamp && (Date.now() - order.timestamp < 30000)) {
                    triggerAlarm(order);
                    sendTelegramNotification(order);
                }
            });

            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                const list = document.getElementById('orders-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `<div class="p-4 bg-white/5 border-l-4 border-red-600 mb-2 flex justify-between items-center">
                        <div><p class="text-white font-bold">${o.product}</p><p class="text-xs text-gray-400">${o.address || 'N/A'}</p></div>
                        <button onclick="window.delOrder('${d.id}')" class="material-icons text-gray-600 hover:text-red-600">delete</button>
                    </div>`;
                });
            });

            onValue(ref(rtdb, 'online_users'), s => {
                document.getElementById('user-stats').innerHTML = `● LIVE: ${s.exists() ? Object.keys(s.val()).length : 0}`;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const u = await getDoc(doc(db, "users", user.uid));
                if (u.exists() && u.data().role === 'admin') loadAdminData();
                else window.location.href = "index.html";
            } else window.location.href = "index.html";
        });

        window.delOrder = async (id) => { if(confirm("წავშალოთ?")) await deleteDoc(doc(db, "orders", id)); };
        window.uploadProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            if(name && price) {
                await addDoc(collection(db, "products"), { name, price, createdAt: Date.now() });
                alert("ატვირთულია!");
            }
        };
    </script>
</body>
</html>
