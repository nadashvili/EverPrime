<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverPrime | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.cdnfonts.com/css/syncopate');
        body { font-family: 'BPG Phone Sans Bold', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        #alarm-overlay { display: none; }
        #alarm-overlay.active { display: flex; animation: bg-flash 0.5s infinite alternate; }
        @keyframes bg-flash {
            from { background-color: rgba(220, 38, 38, 0.95); }
            to { background-color: rgba(153, 27, 27, 0.98); }
        }
        .admin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff0000; }
        
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .nav-btn.active { background: #dc2626; color: white; border-color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="alarm-overlay" class="fixed inset-0 z-[9999] flex-col items-center justify-center text-center p-6 backdrop-blur-xl">
        <div class="mb-6 animate-bounce"><span class="material-icons text-9xl text-white">warning</span></div>
        <h2 class="font-sync text-5xl md:text-7xl font-black italic mb-8 text-white uppercase tracking-tighter">New Order Detected</h2>
        <div id="alarm-details" class="bg-black p-10 border-4 border-white text-left max-w-2xl w-full shadow-[0_0_80px_rgba(255,0,0,0.4)]"></div>
    </div>

    <header class="flex flex-col md:flex-row justify-between items-center border-b border-red-600 pb-8 mb-8 gap-6">
        <div>
            <h1 class="font-sync text-3xl font-black italic uppercase tracking-tighter">Ever<span class="text-red-600">Prime</span></h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-50">Control Center v2.0</p>
        </div>
        
        <div class="flex items-center gap-6 bg-white/5 p-3 px-6 rounded-full border border-white/10">
            <div id="user-stats" class="text-green-500 text-xs font-bold tracking-widest uppercase italic animate-pulse">კავშირი...</div>
            <div class="h-6 w-[1px] bg-white/10"></div>
            <button onclick="location.href='index.html'" class="text-[10px] font-bold uppercase border border-white/20 px-4 py-1.5 hover:bg-white hover:text-black transition">Exit</button>
        </div>
    </header>

    <div class="flex flex-wrap items-center justify-between gap-4 mb-10 border-b border-white/5 pb-6">
        <nav class="flex flex-wrap gap-2">
            <button onclick="showSection('orders-sec', this)" class="nav-btn active border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition hover:bg-white/10">შეკვეთები</button>
            <button onclick="showSection('upload-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition hover:bg-white/10">ატვირთვა</button>
            <button onclick="showSection('delete-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition hover:bg-white/10">წაშლა</button>
            <button onclick="showSection('users-sec', this)" class="nav-btn border border-white/10 px-4 py-2 text-[10px] uppercase font-bold transition hover:bg-white/10">მომხმარებლები</button>
        </nav>

        <div class="flex items-center gap-3 bg-white/5 p-2 px-4 border border-white/10">
            <span class="text-[10px] font-bold uppercase italic text-gray-400">Auto Alarm:</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="alarm-toggle" class="sr-only peer" checked>
                <div class="w-10 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-600 border border-white/10"></div>
            </label>
        </div>
    </div>

    <main>
        <section id="orders-sec" class="admin-section active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-sync text-xs text-red-600 italic uppercase tracking-[0.3em]">Recent Orders</h2>
                <input id="order-search" type="text" placeholder="ძებნა (ავტორი)..." 
                       class="bg-white/5 border border-white/10 p-2 text-[10px] outline-none focus:border-red-600 transition w-64 uppercase tracking-widest text-white">
            </div>
            <div id="orders-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-4 custom-scrollbar"></div>
        </section>

        <section id="upload-sec" class="admin-section">
            <div class="admin-card p-8 border-l-4 border-red-600 max-w-2xl mx-auto">
                <h2 class="font-sync text-xs mb-6 text-white italic uppercase tracking-[0.2em]">Add New Product</h2>
                <div class="grid grid-cols-1 gap-4">
                    <input id="p-name" type="text" placeholder="პროდუქტის დასახელება" class="bg-black/40 border border-white/10 p-3 text-sm outline-none focus:border-red-600 transition text-white">
                    <input id="p-price" type="number" placeholder="ფასი (₾)" class="bg-black/40 border border-white/10 p-3 text-sm outline-none focus:border-red-600 transition text-white">
                    <input id="p-img" type="text" placeholder="სურათის Direct URL" class="bg-black/40 border border-white/10 p-3 text-sm outline-none focus:border-red-600 transition text-white">
                    <textarea id="p-desc" placeholder="მოკლე აღწერა..." class="bg-black/40 border border-white/10 p-3 text-sm outline-none focus:border-red-600 transition h-24 resize-none text-white"></textarea>
                    <button onclick="window.uploadProduct()" class="bg-red-600 p-4 font-black uppercase italic hover:bg-red-700 transition shadow-xl shadow-red-600/10 text-white">Upload to Store</button>
                </div>
            </div>
        </section>

        <section id="delete-sec" class="admin-section">
            <div class="admin-card p-8 border-t border-white/5 max-w-4xl mx-auto">
                <h2 class="font-sync text-xs mb-6 text-gray-500 italic uppercase tracking-[0.2em]">Inventory Management</h2>
                <div id="inventory-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="users-sec" class="admin-section">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="font-sync text-xs text-blue-500 italic uppercase tracking-[0.3em]">User Database</h2>
                    <p class="text-[10px] text-gray-500 uppercase mt-1">მართე რეგისტრირებული მომხმარებლები</p>
                </div>
                <div class="relative w-full md:w-96">
                    <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">search</span>
                    <input id="user-db-search" type="text" placeholder="მოძებნე (ნომერი ან იმეილი)..." 
                           class="w-full bg-white/5 border border-white/10 p-3 pl-10 text-[11px] outline-none focus:border-blue-500 transition uppercase tracking-widest text-white">
                </div>
            </div>
            <div id="users-db-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar"></div>
        </section>
    </main>

    <script>
        function showSection(sectionId, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, doc, getDoc, deleteDoc, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getDatabase, ref, onValue, onChildAdded, limitToLast, query as rQuery } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtQfNnv6qDbnbHzZ-XE8pIylLRYg5UTbg",
            authDomain: "everprime-b80dd.firebaseapp.com",
            projectId: "everprime-b80dd",
            storageBucket: "everprime-b80dd.firebasestorage.app",
            messagingSenderId: "527537324294",
            appId: "1:527537324294:web:de1a4e25057389bc6e9e87",
            databaseURL: "https://everprime-b80dd-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let allOrders = [];
        let allRegisteredUsers = [];
        const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        function triggerAlarm(data) {
            const overlay = document.getElementById('alarm-overlay');
            const details = document.getElementById('alarm-details');
            const alarmToggle = document.getElementById('alarm-toggle');

            if (!alarmToggle || !alarmToggle.checked) return;

            alarmSound.currentTime = 0;
            alarmSound.play().catch(() => console.log("Interaction required for sound"));

            if (Notification.permission === "granted") {
                new Notification("EverPrime: ახალი შეკვეთა!", {
                    body: `პროდუქტი: ${data.product || 'უცნობი'}`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/595/595067.png'
                });
            }

            if (overlay && details) {
                details.innerHTML = `
                    <div class="grid grid-cols-1 gap-4 uppercase font-sync italic text-white">
                        <div class="border-b border-white/20 pb-2">
                            <span class="text-red-600 text-[10px]">პროდუქტი</span>
                            <p class="text-2xl font-black">${data.product || 'ახალი შეკვეთა'}</p>
                        </div>
                        <div><span class="text-red-600 text-[10px]">ტელეფონი</span><p class="text-lg text-green-500">${data.phone || '---'}</p></div>
                    </div>`;
                overlay.classList.add('active');
                if ("vibrate" in navigator) navigator.vibrate([500, 110, 500]);
                setTimeout(() => { overlay.classList.remove('active'); }, 8000);
            }
        }

        function loadAdminData() {
            // ჩაამატე loadAdminData-ს დასაწყისში
if (Notification.permission !== "granted") {
    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            console.log("ნოტიფიკაციები ჩაირთო!");
        }
    });
}

            const ordersLiveRef = rQuery(ref(rtdb, 'orders_live'), limitToLast(1));
            onChildAdded(ordersLiveRef, (snap) => {
                const order = snap.val();
                const isNew = order.timestamp && (Date.now() - order.timestamp < 15000);
                if (isNew) triggerAlarm(order);
            });

            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderOrders(allOrders);
            });

            onValue(ref(rtdb, 'online_users'), snap => {
                const count = snap.exists() ? Object.keys(snap.val()).length : 0;
                document.getElementById('user-stats').innerHTML = `● LIVE USERS: ${count}`;
            });

            onSnapshot(collection(db, "products"), snap => {
                const list = document.getElementById('inventory-list');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    list.innerHTML += `<div class="p-4 bg-black/40 border border-white/5 flex justify-between items-center group">
                        <span class="text-sm font-bold uppercase italic text-gray-400">${p.name} - ${p.price}₾</span>
                        <button onclick="window.delProd('${d.id}')" class="text-[10px] text-red-900 hover:text-red-600 uppercase transition">Delete</button>
                    </div>`;
                });
            });
            initUserDatabase();
        }

        function initUserDatabase() {
            onSnapshot(collection(db, "users"), snap => {
                allRegisteredUsers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUsers(allRegisteredUsers);
            });
            document.getElementById('user-db-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allRegisteredUsers.filter(u => 
                    (u.email && u.email.toLowerCase().includes(term)) || 
                    (u.phone && u.phone.includes(term))
                );
                renderUsers(filtered);
            });
        }

        function renderOrders(ordersArray) {
            const list = document.getElementById('orders-list');
            document.getElementById('order-search').oninput = (e) => {
                const val = e.target.value.toLowerCase();
                displayOrders(ordersArray.filter(o => (o.phone && o.phone.includes(val)) || (o.email && o.email.toLowerCase().includes(val))));
            };
            displayOrders(ordersArray);
        }

        function displayOrders(arr) {
            const list = document.getElementById('orders-list');
            if (!list) return;
            list.innerHTML = '';
            arr.forEach(o => {
                const date = o.time?.toDate ? o.time.toDate().toLocaleString('ka-GE') : 'ახლახანს';
                list.innerHTML += `
                    <div class="p-4 bg-white/5 border-l-4 border-red-600 flex justify-between items-center mb-2 group hover:bg-white/10 transition">
                        <div>
                            <p class="text-red-600 font-bold text-[15px] uppercase italic">${date}</p>
                            <h4 class="font-bold text-md uppercase text-white">${o.product}</h4>
                            <p class="text-[10px] text-gray-400 font-mono">${o.phone || 'N/A'} | ${o.email}</p>
                        </div>
                        <button onclick="window.delOrder('${o.id}')" class="text-gray-600 hover:text-red-600 transition">
                            <span class="material-icons">delete_sweep</span>
                        </button>
                    </div>`;
            });
        }

        function renderUsers(usersArray) {
            const list = document.getElementById('users-db-list');
            if (!list) return;
            list.innerHTML = '';
            usersArray.forEach(u => {
                list.innerHTML += `
                    <div class="p-4 bg-white/5 border border-white/5 flex justify-between items-center hover:border-blue-500/30 transition">
                        <div class="overflow-hidden">
                            <p class="text-blue-500 font-bold text-[11px] uppercase truncate">${u.email || 'No Email'}</p>
                            <p class="text-[14px] text-white font-mono tracking-tighter">${u.phone || '---'}</p>
                        </div>
                        <button onclick="window.delUserAccount('${u.id}', '${u.email}')" class="ml-4 text-gray-700 hover:text-red-600 transition">
                            <span class="material-icons text-lg">person_remove</span>
                        </button>
                    </div>`;
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const u = await getDoc(doc(db, "users", user.uid));
                if (u.exists() && u.data().role === 'admin') loadAdminData();
                else window.location.href = "index.html";
            } else window.location.href = "index.html";
        });

        window.delOrder = async (id) => { if(confirm("წავშალოთ შეკვეთა?")) await deleteDoc(doc(db, "orders", id)); };
        window.delProd = async (id) => { if(confirm("წავშალოთ პროდუქტი?")) await deleteDoc(doc(db, "products", id)); };
        window.delUserAccount = async (id, email) => { if(confirm(`წავშალოთ მომხმარებელი?\n(${email})`)) await deleteDoc(doc(db, "users", id)); };

        window.uploadProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const desc = document.getElementById('p-desc').value;
            if(!name || !price) return alert("შეავსეთ ველები!");
            try {
                await addDoc(collection(db, "products"), { name, price, img, desc, createdAt: Date.now() });
                alert("დამატებულია!");
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
            } catch (e) { alert("შეცდომა!"); }
        };
    </script>
</body>
</html>
